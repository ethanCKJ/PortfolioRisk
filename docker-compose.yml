services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: portfoliorisk
      POSTGRES_USER: portfoliorisk
      POSTGRES_PASSWORD: portfoliorisk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfoliorisk -d portfoliorisk"]
      interval: 10s
      timeout: 5s
      retries: 5
  market-data-service:
     build:
       context: .
       dockerfile: market-data-service/Dockerfile
     ports:
        - "8080:8080"
     depends_on:
       postgres:
            condition: service_healthy
volumes:
    postgres-data:



